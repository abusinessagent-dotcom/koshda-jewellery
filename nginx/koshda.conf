# Upstream block for Node backend instances (Load Balancing)
upstream koshda_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# Redirect HTTP (Port 80) to HTTPS (Port 443)
server {
    listen 80;
    listen [::]:80;
    server_name koshdajewelleryhouse.shop www.koshdajewelleryhouse.shop;

    # Let's Encrypt ACME challenge path
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Server block (Port 443)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name koshdajewelleryhouse.shop www.koshdajewelleryhouse.shop;

    # SSL Certificate Configuration (Let's Encrypt paths)
    ssl_certificate /etc/letsencrypt/live/koshdajewelleryhouse.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/koshdajewelleryhouse.shop/privkey.pem;

    # SSL Optimization Parameters
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS (HTTP Strict Transport Security) - 1 Year duration
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Additional Hardened Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; img-src 'self' data: blob: https: https://placehold.co; connect-src 'self'; font-src 'self' https://fonts.gstatic.com; frame-src 'none'; object-src 'none';" always;

    # Gzip Compression settings
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Root Directory for Static fallback if any
    root /var/www/jewellery-platform;

    # Direct Static Asset Serving (Improves Node performance)
    location /public/ {
        alias /var/www/jewellery-platform/public/;
        expires 7d;
        access_log off;
        add_header Cache-Control "public, no-transform";
    }

    location /uploads/ {
        alias /var/www/jewellery-platform/uploads/;
        expires 7d;
        access_log off;
        add_header Cache-Control "public, no-transform";
    }

    # Proxy all traffic to the Node.js Express Backend
    location / {
        proxy_pass http://koshda_backend;
        proxy_http_version 1.1;

        # Upgrade headers for WebSockets support (future growth)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # Standard Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Disable buffering for real-time responsiveness
        proxy_buffering off;
    }
}
